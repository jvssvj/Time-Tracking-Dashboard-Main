<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="assets/styles/index.css">
  <link rel="stylesheet" href="assets/styles/index - media_queries.css">
  <script src="src/index.js" defer></script>
  
  <title>Frontend Mentor | Time tracking dashboard</title>

</head>
<body>
  <main class="main">
    <section class="section__person">
      <div class="person__profile">
        <img class="person__image" src="assets/images/image-jeremy.png" alt="Jeremy Image">
        <div class="person__text">
          <span class="person__report" >Report for</span>
          <h1 class="person__name" >Jeremy Robson</h1>
        </div>
      </div>
      <section class="section__person__btns">
        <div class="person__btns">
          <input type="button" value="Daily" id="daily--btn">
          <input type="button" value="Weekly" id="weekly--btn">
          <input type="button" value="Monthly" id="monthly--btn">
        </div>
      </section>
    </section>

    
    <div class="card__work">
      <div class="work__background">
        <img src="assets/images/icon-work.svg" alt="Work background">
      </div>

      <div class="work__infos">
        <div class="work__title__div">
          <span class="work__title__txt">Work</span>
          <img class="work__title__img" src="assets/images/icon-ellipsis.svg" alt="Ellipsis">
        </div>
        <div class="work__previous__div">
          <span class="work__hours">32hrs</span>
          <div class="work__last__time">
            <span class="work__last__period">Last Week -</span>
            <span class="work__last__hours">36hrs</span>
          </div>
        </div>
      </div>

    </div>

    <div class="card__play">
      <div class="play__background">
        <img src="assets/images/icon-play.svg" alt="Play background">
      </div>

      <div class="play__infos">
        <div class="play__title__div">
          <span class="play__title__txt" >Play</span>
          <img class="play__title__img" src="assets/images/icon-ellipsis.svg" alt="Ellipsis">
        </div>
        <div class="play__previous__div">
          <span class="play__hours">10hrs</span>
          <div class="play__last__time">
            <span class="play__last__period">Last Week -</span>
            <span class="play__last__hours">8hrs</span>
          </div>
        </div>
      </div>

    </div>

    <div class="card__study">
      <div class="study__background">
        <img src="assets/images/icon-study.svg" alt="Study background">
      </div>

      <div class="study__infos">
        <div class="study__title__div">
          <span class="study__title__txt" >Study</span>
          <img class="study__title__img" src="assets/images/icon-ellipsis.svg" alt="Ellipsis">
        </div>

        <div class="study__previous__div">
          <span class="study__hours">4hrs</span>
          <div class="study__last__time">
            <span class="study__last__period">Last Week -</span>
            <span class="study__last__hours">7hrs</span>    
          </div>
        </div>
      </div>

    </div>

    <div class="card__exercise">
      <div class="exercise__background">
        <img src="assets/images/icon-exercise.svg" alt="Exercise background">
      </div>

      <div class="exercise__infos">
        <div class="exercise__title__div">
          <span class="exercise__title__txt" >Exercise</span>
          <img class="exercise__title__img" src="assets/images/icon-ellipsis.svg" alt="Ellipsis">
        </div>
        
        <div class="exercise__previous__div">
          <span class="exercise__hours">4hrs</span>
          <div class="exercise__last__time">
            <span class="exercise__last__period">Last Week -</span>
            <span class="exercise__last__hours">5hrs</span>            
          </div>
        </div>
      </div>

    </div>
    <div class="card__social">
      <div class="social__background">
        <img src="assets/images/icon-social.svg" alt="Social background">
      </div>

      <div class="social__infos">
        <div class="social__title__div">
          <span class="social__title__txt" >Social</span>
          <img class="social__title__img" src="assets/images/icon-ellipsis.svg" alt="Ellipsis">
        </div>
        
        <div class="social__previous__div">
          <span class="social__hours">5hrs</span>
          <div class="social__last__time">
            <span class="social__last__period">Last Week -</span>
            <span class="social__last__hours">10hrs</span>
          </div>
        </div>
      </div>

    </div>
    <div class="card__selfcare">
      <div class="selfcare__background">
        <img src="assets/images/icon-self-care.svg" alt="Selfcare background">
      </div>

      <div class="selfcare__infos">
        <div class="selfcare__title__div">
          <span class="selfcare__title__txt" >Self Care</span>
          <img class="selfcare__title__img" src="assets/images/icon-ellipsis.svg" alt="Ellipsis">
        </div>
        
        <div class="selfcare__previous__div">
          <span class="selfcare__hours">2hrs</span>
          <div class="selfcare__last__time">
            <span class="selfcare__last__period">Last Week -</span>
            <span class="selfcare__last__hours">2hrs</span>            
          </div>
        </div>
      </div>

    </div>
  
  </main>
  <footer class="attribution">
    <p >Challenge by <a href="https://www.frontendmentor.io/profile/jvssvj" target="_blank">Frontend Mentor</a>. Coded by <a href="https://www.linkedin.com/in/jo%C3%A3o-vitor-62b518263/" target="_blank">João Vitor</a></p>
  </footer>
</body>
</html>
